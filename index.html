<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Fuel Pass Generator - Beelix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary-red: #d32f2f;
            --dark-grey: #2d3436;
            --light-grey: #f5f6fa;
            --accent-blue: #3867d6;
            --border-color: #dcdde1;
            --error-red: #ff4757;
            --text-muted: #636e72;
            --success-green: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', 'Sinhala', 'Tamil', Roboto, Helvetica, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2f3640;
            min-height: 100vh;
        }

        .lang-bar {
            width: 100%;
            background: white;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 2000;
        }
        .lang-btn {
            padding: 5px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .page-header {
            text-align: center;
            padding: 20px;
            text-transform: uppercase;
        }
        .page-header h1 {
            color: var(--primary-red);
            margin: 0;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .container {
            width: 95%;
            max-width: 480px;
            padding-bottom: 30px;
            flex-grow: 1;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background-color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .is-invalid {
            border: 2px solid var(--error-red) !important;
            background-color: #fff8f8 !important;
        }

        .vehicle-entry {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .remove-vehicle-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }

        .add-btn {
            background: white;
            border: 2px dashed var(--accent-blue);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            color: var(--accent-blue);
        }

        /* Updated File/Camera Wrapper */
        .file-upload-wrapper { display: flex; gap: 8px; align-items: center; }
        .file-display {
            flex: 1;
            background: var(--light-grey);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-btn, .cam-btn {
            color: white;
            padding: 12px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-btn { background: var(--dark-grey); }
        .cam-btn { background: var(--accent-blue); }
        input[type="file"] { display: none; }

        .preview-label {
            margin-top: 25px;
            font-size: 15px;
            color: #57606f;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        #preview-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }

        .fuel-card {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .card-header {
            background: var(--dark-grey);
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
        }

        .card-body {
            display: flex;
            padding: 20px;
            align-items: center;
            gap: 20px;
        }

        .qr-placeholder {
            width: 110px;
            height: 110px;
            background: #fff;
            border: 1px solid #eee;
            padding: 5px;
            border-radius: 4px;
            object-fit: contain;
        }

        .card-info {
            font-size: 14px;
            color: #2d3436;
            flex: 1;
        }
        .card-info div { margin-bottom: 5px; }
        .card-info b { color: #636e72; font-weight: 600; min-width: 90px; display: inline-block; }
        .card-info span { font-weight: 700; color: #000; }

        .card-footer {
            background: #f1f2f6;
            color: #7f8c8d;
            text-align: center;
            padding: 6px;
            font-size: 11px;
            border-top: 1px solid #eee;
        }
        .card-footer span { color: var(--primary-red); font-weight: bold; }

        .download-btn {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        #video-preview {
            width: 100%;
            border-radius: 8px;
            background: #000;
            margin-bottom: 15px;
        }

        .site-footer {
            width: 100%;
            background: white;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }
        .policy-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 400px;
            margin: 10px auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('si')">සිංහල</button>
        <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
    </div>

    <div class="page-header">
        <h1 id="ui-title">NATIONAL FUEL PASS</h1>
        <span id="ui-subtitle">generator</span>
    </div>

    <div class="container">
        <div class="input-group">
            <label id="ui-label-owner">Owner's Name</label>
            <input type="text" id="owner" placeholder="Enter Name" oninput="validateField(this)">
        </div>

        <div class="input-group">
            <label id="ui-label-phone">Phone No.</label>
            <input type="tel" id="phone" placeholder="0712345678" oninput="validateField(this)">
        </div>

        <div id="vehicle-holder">
            </div>

        <button class="add-btn" id="add-vehicle-btn" onclick="addVehicle()">+ Add Another Vehicle</button>

        <div class="preview-label" id="ui-preview-heading">Live Preview Group</div>
        <div id="preview-container"></div>

        <button class="download-btn" id="ui-btn-download" onclick="handleDownloadRequest()">Download</button>
    </div>

    <div class="modal" id="cameraModal">
        <div class="modal-content">
            <h3 id="ui-cam-title">Scan QR Code</h3>
            <video id="video-preview" playsinline></video>
            <button class="modal-btn" style="background:#95a5a6; color:white; width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer;" onclick="stopCamera()">Cancel</button>
            <canvas id="qr-canvas" style="display: none;"></canvas>
        </div>
    </div>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <h3 id="ui-modal-title">Download Formats</h3>
            <p id="ui-modal-desc">Select how you wish to output the pass(es):</p>
            <button class="modal-btn" id="ui-btn-pdf" style="background:#e74c3c; color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px; cursor:pointer;" onclick="processDownload('pdf')">A4 PDF</button>
            <button class="modal-btn" id="ui-btn-img" style="background:#2ecc71; color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px; cursor:pointer;" onclick="processDownload('img')">Images</button>
            <button class="modal-btn" id="ui-btn-cancel" style="background:#95a5a6; color:white; width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer;" onclick="closeDownloadModal()">Cancel</button>
        </div>
    </div>

    <footer class="site-footer">
        <div class="policy-container">
            <span class="policy-icon">🛡️</span>
            <p class="policy-text" id="ui-policy-text">
                As Beelix Solutions, we do not collect, store, or transmit any of your personal data. 
                All processing happens locally on your device.
            </p>
            <span style="font-weight: bold;">Beelix Solutions</span>
        </div>
    </footer>

    <script>

                owner: "අයිතිකරුගේ නම", phone: "දුරකථන අංකය", vno: "වාහන අංකය",
                fuel: "ඉන්ධන වර්ගය", petrol: "පෙට්‍රල්", diesel: "ඩීසල්",
                qrupload: "QR කේතය ඇතුලත් කරන්න", choose: "ගොනුව", cam: "📷 ස්කෑන්",
                noFile: "ගොනුවක් තෝරා නැත", add: "+ තවත් වාහනයක් එක් කරන්න",
                preview: "පෙරදසුන", download: "බාගත කරන්න",
                modalTitle: "බාගත කිරීමේ ක්‍රමය", modalDesc: "අවශ්‍ය ආකාරය තෝරන්න:",
                btnPdf: "A4 PDF ලෙස බාගන්න", btnImg: "ඡායාරූප ලෙස බාගන්න",
                cancel: "අවලංගු කරන්න", cardOwner: "අයිතිකරුගේ නම", cardVno: "වාහන අංකය",
                cardPhone: "දුරකථන අංකය", cardFuel: "ඉන්ධන වර්ගය", poweredBy: "සහාය",
                errMsg: "කරුණාකර සියලු විස්තර පුරවා QR කේතය ඇතුළත් කරන්න.",
                camTitle: "QR කේතය ස්කෑන් කරන්න", camError: "කැමරා අවසරය ලබා දී නොමැත.",
                policy: "Beelix Solutions ලෙස, අපි ඔබගේ කිසිදු පෞද්ගලික දත්තයක් රැස් කිරීම, ගබඩා කිරීම හෝ ලබා ගැනීම සිදු නොකරමු. සියලුම ක්‍රියාවලීන් ඔබගේ උපාංගය තුලම සිදු වේ."
            },
            ta: {
                title: "தேசிய எரிபொருள் அனுமதி", subtitle: "உருவாக்கி",
                owner: "உரிமையாளர் பெயர்", phone: "தொலைபேசி எண்", vno: "வாகன எண்",
                fuel: "எரிபொருள் வகை", petrol: "பெட்ரோல்", diesel: "டீசல்",
                qrupload: "QR படத்தை பதிவேற்றவும்", choose: "கோப்பு", cam: "📷 ஸ்கேன்",
                noFile: "கோப்பு எதுவும் தேர்ந்தெடுக்கப்படவில்லை", add: "+ மற்றொரு வாகனத்தைச் சேர்க்கவும்",
                preview: "முன்னோட்டம்", download: "பதிவிறக்கம்",
                modalTitle: "பதிவிறக்க வடிவங்கள்", modalDesc: "வெளியீட்டு வடிவமைப்பைத் தேர்ந்தெடுக்கவும்:",
                btnPdf: "A4 PDF ஆக பதிவிறக்கவும்", btnImg: "படங்களாக பதிவிறக்கவும்",
                cancel: "ரத்து செய்", cardOwner: "பெயர்", cardVno: "வாகன எண்",
                cardPhone: "தொலைபேசி எண்", cardFuel: "எரிபொருள் வகை", poweredBy: "ஆதரவு",
                errMsg: "அனைத்து புலங்களையும் பூர்த்தி செய்து QR குறியீட்டைப் பதிவேற்றவும்.",
                camTitle: "QR குறியீட்டை ஸ்கேன் செய்யவும்", camError: "கேமரா அனுமதி மறுக்கப்பட்டது.",
                policy: "Beelix Solutions என்ற முறையில், உங்களின் தனிப்பட்ட தரவு எதையும் நாங்கள் சேகரிக்கவோ, சேமிக்கவோ அல்லது பகிரவோ மாட்டோம்."
            }
        };

        let currentLang = 'en';
        let vehicleCount = 0;
        const maxVehicles = 6;
        const defaultBlankQR = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
        let qrDataStore = {};
        let videoStream = null;
        let activeScanningIndex = null;

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-label-owner').innerText = i18n[lang].owner;
            document.getElementById('ui-label-phone').innerText = i18n[lang].phone;
            document.getElementById('add-vehicle-btn').innerText = i18n[lang].add;
            document.getElementById('ui-preview-heading').innerText = i18n[lang].preview;
            document.getElementById('ui-btn-download').innerText = i18n[lang].download;
            document.getElementById('ui-policy-text').innerText = i18n[lang].policy;
            document.getElementById('ui-modal-title').innerText = i18n[lang].modalTitle;
            document.getElementById('ui-modal-desc').innerText = i18n[lang].modalDesc;
            document.getElementById('ui-btn-pdf').innerText = i18n[lang].btnPdf;
            document.getElementById('ui-btn-img').innerText = i18n[lang].btnImg;
            document.getElementById('ui-btn-cancel').innerText = i18n[lang].cancel;
            document.getElementById('ui-cam-title').innerText = i18n[lang].camTitle;

            renumberVehicles();
            updateCards();
        }

        function addVehicle() {
            if (vehicleCount >= maxVehicles) return;
            const holder = document.getElementById('vehicle-holder');
            const index = vehicleCount;
            const div = document.createElement('div');
            div.className = "vehicle-entry";
            div.setAttribute("data-index", index);
            div.innerHTML = `
                <button class="remove-vehicle-btn" onclick="removeVehicle(${index})">×</button>
                <div class="row">
                    <div class="input-group">
                        <label class="ui-label-vno">${i18n[currentLang].vno} ${index + 1}</label>
                        <input type="text" class="v-no" placeholder="ABC-0000" oninput="updateCards(); validateField(this)">
                    </div>
                    <div class="input-group">
                        <label class="ui-label-fuel">${i18n[currentLang].fuel}</label>
                        <select class="v-fuel" onchange="updateCards()">
                            <option value="Petrol">${i18n[currentLang].petrol}</option>
                            <option value="Diesel">${i18n[currentLang].diesel}</option>
                        </select>
                    </div>
                </div>
                <label class="ui-label-qrupload">${i18n[currentLang].qrupload}</label>
                <div class="file-upload-wrapper">
                    <div class="file-display v-file-name">${i18n[currentLang].noFile}</div>
                    <button class="cam-btn" onclick="startCamera(${index})">${i18n[currentLang].cam}</button>
                    <label for="upload-${index}" class="file-btn">${i18n[currentLang].choose}</label>
                    <input type="file" id="upload-${index}" class="v-upload" accept="image/*" onchange="handleQRUpload(this, ${index})">
                </div>
            `;
            holder.appendChild(div);
            qrDataStore[index] = defaultBlankQR;
            vehicleCount++;
            if (vehicleCount === maxVehicles) document.getElementById('add-vehicle-btn').style.display = 'none';
            updateCards();
        }

        function removeVehicle(index) {
            const entry = document.querySelector(`.vehicle-entry[data-index="${index}"]`);
            if (entry) {
                entry.remove();
                delete qrDataStore[index];
                vehicleCount--;
                document.getElementById('add-vehicle-btn').style.display = 'block';
                renumberVehicles();
                updateCards();
            }
        }

        function renumberVehicles() {
            const entries = document.querySelectorAll('.vehicle-entry');
            entries.forEach((entry, i) => {
                entry.setAttribute("data-index", i);
                entry.querySelector('.ui-label-vno').innerText = `${i18n[currentLang].vno} ${i + 1}`;
                entry.querySelector('.ui-label-fuel').innerText = i18n[currentLang].fuel;
                entry.querySelector('.ui-label-qrupload').innerText = i18n[currentLang].qrupload;
                entry.querySelector('.cam-btn').innerText = i18n[currentLang].cam;
                entry.querySelector('.file-btn').innerText = i18n[currentLang].choose;
                
                const select = entry.querySelector('.v-fuel');
                const val = select.value;
                select.options[0].text = i18n[currentLang].petrol;
                select.options[1].text = i18n[currentLang].diesel;
                select.value = val;
            });
        }

        function updateCards() {
            const owner = document.getElementById('owner').value || "---";
            const phone = document.getElementById('phone').value || "---";
            const pContainer = document.getElementById('preview-container');
            pContainer.innerHTML = '';

            document.querySelectorAll('.vehicle-entry').forEach((entry) => {
                const index = entry.getAttribute("data-index");
                const vNo = entry.querySelector('.v-no').value || "---";
                const fuelRaw = entry.querySelector('.v-fuel').value;
                const fuelDisplay = fuelRaw === 'Petrol' ? i18n[currentLang].petrol : i18n[currentLang].diesel;
                const qrSrc = qrDataStore[index] || defaultBlankQR;

                pContainer.innerHTML += `
                    <div class="fuel-card" id="card-render-${index}">
                        <div class="card-header">${i18n[currentLang].title}</div>
                        <div class="card-body">
                            <img class="qr-placeholder" src="${qrSrc}">
                            <div class="card-info">
                                <div><b>${i18n[currentLang].cardOwner} :</b> <span>${owner}</span></div>
                                <div><b>${i18n[currentLang].cardVno} :</b> <span>${vNo}</span></div>
                                <div><b>${i18n[currentLang].cardPhone} :</b> <span>${phone}</span></div>
                                <div><b>${i18n[currentLang].cardFuel} :</b> <span>${fuelDisplay}</span></div>
                            </div>
                        </div>
                        <div class="card-footer">${i18n[currentLang].poweredBy} <span>Beelix solutions</span></div>
                    </div>
                `;
            });
        }

        // --- Camera Logic ---
        async function startCamera(index) {
            activeScanningIndex = index;
            const video = document.getElementById('video-preview');
            document.getElementById('cameraModal').style.display = 'flex';

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = videoStream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(scanFrame);
            } catch (err) {
                alert(i18n[currentLang].camError);
                stopCamera();
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            document.getElementById('cameraModal').style.display = 'none';
        }

        function scanFrame() {
            const video = document.getElementById('video-preview');
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvasElement = document.getElementById('qr-canvas');
                const canvas = canvasElement.getContext('2d', { willReadFrequently: true });
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    // Extract QR area
                    const dim = (code.location.topRightCorner.x - code.location.topLeftCorner.x) + 40;
                    const finalCanvas = document.createElement("canvas");
                    finalCanvas.width = dim; finalCanvas.height = dim;
                    finalCanvas.getContext("2d").drawImage(video, code.location.topLeftCorner.x - 20, code.location.topLeftCorner.y - 20, dim, dim, 0, 0, dim, dim);
                    
                    qrDataStore[activeScanningIndex] = finalCanvas.toDataURL();
                    
                    const entry = document.querySelector(`.vehicle-entry[data-index="${activeScanningIndex}"]`);
                    entry.querySelector('.v-file-name').innerText = "QR Scanned Successfully";
                    entry.querySelector('.v-file-name').classList.remove('is-invalid');

                    updateCards();
                    stopCamera();
                    return;
                }
            }
            if (videoStream) requestAnimationFrame(scanFrame);
        }

        // --- Standard Upload ---
        function handleQRUpload(input, index) {
            const file = input.files[0];
            if (!file) return;
            const entry = input.closest('.vehicle-entry');
            const display = entry.querySelector('.v-file-name');
            display.innerText = file.name;
            display.classList.remove('is-invalid');

            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = function () {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const qr = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                
                const minX = qr ? qr.location.topLeftCorner.x - 10 : 0;
                const minY = qr ? qr.location.topLeftCorner.y - 10 : 0;
                const dim = qr ? (qr.location.topRightCorner.x - qr.location.topLeftCorner.x) + 20 : Math.min(img.width, img.height);
                
                const finalCanvas = document.createElement("canvas");
                finalCanvas.width = dim; finalCanvas.height = dim;
                finalCanvas.getContext("2d").drawImage(img, minX, minY, dim, dim, 0, 0, dim, dim);
                qrDataStore[index] = finalCanvas.toDataURL();
                updateCards();
            };
        }

        function validateField(el) {
            if (el.value.trim() !== "") el.classList.remove('is-invalid');
            updateCards();
        }

        function handleDownloadRequest() {
            let isValid = true;
            const owner = document.getElementById('owner');
            const phone = document.getElementById('phone');
            if (!owner.value.trim()) { owner.classList.add('is-invalid'); isValid = false; }
            if (!phone.value.trim()) { phone.classList.add('is-invalid'); isValid = false; }

            document.querySelectorAll('.vehicle-entry').forEach(entry => {
                const index = entry.getAttribute('data-index');
                const vNoInput = entry.querySelector('.v-no');
                const fileDisplay = entry.querySelector('.v-file-name');
                if (!vNoInput.value.trim()) { vNoInput.classList.add('is-invalid'); isValid = false; }
                if (qrDataStore[index] === defaultBlankQR) { fileDisplay.classList.add('is-invalid'); isValid = false; }
            });

            if (!isValid) { alert(i18n[currentLang].errMsg); return; }
            document.getElementById('downloadModal').style.display = 'flex';
        }

        function closeDownloadModal() { document.getElementById('downloadModal').style.display = 'none'; }

        async function processDownload(type) {
            closeDownloadModal();
            const cards = document.querySelectorAll('.fuel-card');
            const btn = document.getElementById('ui-btn-download');
            btn.innerText = "..."; btn.disabled = true;

            try {
                if (type === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    for (let i = 0; i < cards.length; i++) {
                        const canvas = await html2canvas(cards[i], { scale: 3, useCORS: true });
                        const col = i % 2; const row = Math.floor(i / 2);
                        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 15 + (col * 95.6), 20 + (row * 63.98), 85.6, 53.98);
                    }
                    pdf.save("FuelPasses.pdf");
                } else {
                    for (let i = 0; i < cards.length; i++) {
                        const canvas = await html2canvas(cards[i], { scale: 3, useCORS: true });
                        const link = document.createElement("a");
                        link.download = `FuelPass_${i+1}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    }
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.innerText = i18n[currentLang].download;
                btn.disabled = false;
            }
        }

        document.getElementById('owner').addEventListener('input', updateCards);
        document.getElementById('phone').addEventListener('input', updateCards);
        
        window.onload = () => {
            addVehicle(); // Start with one vehicle
            updateCards();
        };
    </script>
</body>
</html>
